name: Weekly stock report

on:
  schedule:
    # Monday 11:37 UTC (7:37am ET, pre-market). Off-peak minute: GitHub queues
    # top-of-hour schedules and can delay them by hours; today's 13:00 run
    # started at 15:16. The chat-summary Routine fires at 16:00 UTC to allow
    # for remaining delay.
    - cron: "37 11 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        run: python run_weekly_report.py --output-dir reports
      - name: Update scoreboard
        run: python run_scoreboard.py --reports-dir reports
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Weekly report $(date -u +%F)"
          git push
